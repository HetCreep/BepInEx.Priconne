# Code scanning (CodeQL) — security. Scans the C# loader source for vulnerabilities.
# build-mode: none = buildless analysis (no compile) → it scans whatever C# is checked into the
# workspace, so the hub (main) must pull the BepInEx component in first (it holds the actual source;
# main itself is docs-only). This is what caught the Zip Slip (CWE-22) in DownloadTasks.cs.
#
# SCOPE: BepInEx ONLY (current focus). The Il2CppInterop scan is TEMPORARILY DISABLED — re-enable its
# checkout step below when work shifts to that component.
#
# Trigger model mirrors ci.yml: component branches carry no workflow, so the weekly schedule + PRs +
# a hub change to this file + manual dispatch are the drivers. Re-vendored a component? Dispatch by hand.
# Actions are SHA-pinned (D2); Dependabot keeps them current.
name: codeql

on:
  push:
    branches: [main]
    paths: ['.github/workflows/codeql.yml']
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '23 4 * * 1'   # weekly, Monday 04:23 UTC

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hub
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout BepInEx component (the loader framework source)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { repository: HetCreep/BepInEx.Priconne, ref: BepInEx, path: BepInEx }

      # Il2CppInterop scan TEMPORARILY DISABLED (focus = BepInEx). Re-enable by uncommenting:
      # - name: Checkout Il2CppInterop component (our v1.5.2 + scan-fix dev branch)
      #   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      #   with: { repository: HetCreep/BepInEx.Priconne, ref: Il2CppInterop, path: Il2CppInterop }

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:csharp"
