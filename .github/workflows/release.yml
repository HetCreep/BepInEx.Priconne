# D2 — release integrity. On a manual dispatch (with `tag` + `interop_tag`): build the loader,
# assemble the deploy, package it, publish a SHA-256 checksum, and create a GitHub Release.
# CI-only release (never hand-built). Actions are SHA-pinned (D2). Excellence follow-ups:
# build provenance (actions/attest-build-provenance) + an SBOM.
# Dispatch-only (no tag-push trigger): a release needs the matching interop_tag, so it is always
# a deliberate "Run workflow" with both inputs — not an automatic tag-push (which would have no interop).
name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. 20260605)'
        required: true
      interop_tag:
        description: 'OPTIONAL: tag of an interop-* release with interop.zip. Leave EMPTY for a loader-core (overlay) release.'
        required: false

permissions:
  contents: write              # create the release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout BepInEx.Priconne
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: BepInEx.Priconne

      - name: Checkout BepInEx core fork
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { repository: HetCreep/BepInEx, ref: master, path: BepInEx }

      - name: Checkout Il2CppInterop (Priconne dev branch — decoupled from the give-and-take fork)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { repository: HetCreep/BepInEx.Priconne, ref: Il2CppInterop, path: Il2CppInterop }

      - name: Setup .NET (6 = loader target, 8 = Cake build host)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Build Il2CppInterop trio (HarmonySupport pulls in Runtime + Common via project-ref)
        # Building only Runtime.csproj omits HarmonySupport.dll (BepInEx's IL2CPP Harmony layer needs it).
        # HarmonySupport references Runtime->Common, so this one build drops all three into its output dir.
        run: dotnet build Il2CppInterop/Il2CppInterop.HarmonySupport/Il2CppInterop.HarmonySupport.csproj -c Release --nologo

      - name: Build BepInEx IL2CPP core (Cake MakeDist — fetches native deps incl dobby.dll)
        # `--target MakeDist` = Compile + DownloadDependencies + assemble into dist-il2cpp/BepInEx/core
        # WITH dobby.dll. Plain `dotnet build` / `--target Compile` does NOT download dobby — that was the
        # broken-release bug (CI green, artifact missing dobby). MakeDist is reproducible from source.
        working-directory: BepInEx
        shell: cmd
        run: build.cmd --target MakeDist

      - name: Assemble BepInEx/core
        shell: pwsh
        run: |
          $stage = "stage/BepInEx/core"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          # Source = Cake MakeDist output (complete core incl dobby.dll + runtimes/), NOT bin/ (no dobby there).
          $core = "BepInEx/dist-il2cpp/BepInEx/core"
          if (-not (Test-Path "$core/dobby.dll")) {
            Write-Error "MakeDist output has no dobby.dll at $core — aborting (would ship a non-booting loader)."; exit 1
          }
          Copy-Item "$core/*" $stage -Recurse -Force
          # Overlay the Il2CppInterop v1.5.2+fix trio (bind-by-name, drop-in)
          $rt = "Il2CppInterop/bin/Il2CppInterop.HarmonySupport/net6.0"
          foreach ($d in 'Il2CppInterop.Runtime.dll','Il2CppInterop.Common.dll','Il2CppInterop.HarmonySupport.dll') {
            if (Test-Path "$rt/$d") { Copy-Item "$rt/$d" $stage -Force }
          }
          # Trim native runtimes to win-x64 — the only platform the DMM game ever reaches (drop
          # osx/linux/arm/x86 = never-reached overkill). The gen tooling (Cpp2IL / dumper) STAYS:
          # it is the acceptable overkill — the regen path for when Cygames changes the game system
          # (e.g. the historical Mono-32 -> IL2CPP-64 shift, or a future metadata bump).
          Get-ChildItem "$stage/runtimes" -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -ne 'win-x64' } | Remove-Item -Recurse -Force

      - name: Fetch offline-generated interop (optional — game-derived type metadata)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          INTEROP_TAG: ${{ github.event.inputs.interop_tag }}   # via env, not inline — no shell injection
        # Interop is generated OFFLINE (no game in CI) and stored SEPARATELY as a versioned release
        # asset (`interop-<gamebuild>` → interop.zip), so the code tree never holds game-derived bytes.
        # If interop_tag is given, bundle it (a full-install release). If empty, this is a loader-CORE
        # (overlay) release — ship BepInEx/core only, to overlay onto an existing BepInEx 6 IL2CPP
        # install (which keeps its own .NET host + doorstop + interop). No interop = no provenance issue.
        run: |
          $interopTag = $env:INTEROP_TAG
          if (-not $interopTag) { Write-Host "No interop_tag — building a loader-CORE (overlay) release: BepInEx/core only, no interop."; exit 0 }
          gh release download $interopTag --repo $env:GITHUB_REPOSITORY --pattern 'interop.zip' --dir .
          if (-not (Test-Path "interop.zip")) { Write-Error "interop.zip not found in release '$interopTag'."; exit 1 }
          Expand-Archive "interop.zip" -DestinationPath "stage/BepInEx/interop" -Force
          if (-not (Get-ChildItem "stage/BepInEx/interop" -Filter *.dll -ErrorAction SilentlyContinue)) {
            Write-Error "interop.zip contained no DLLs."; exit 1
          }

      - name: Package + checksum
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag }}   # via env (dispatch-only — no tag-push ref to parse)
        run: |
          # Final integrity gate (D2): never publish a core missing the native hook lib or the loader entry DLL.
          $core = "stage/BepInEx/core"
          foreach ($must in 'dobby.dll','BepInEx.Unity.IL2CPP.dll') {
            if (-not (Test-Path "$core/$must")) { Write-Error "stage missing $must — refusing to package a broken release."; exit 1 }
          }
          $tag = $env:RELEASE_TAG
          $zip = "BepInEx.Priconne_$tag.zip"
          Compress-Archive -Path "stage/*" -DestinationPath $zip -Force
          (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower() + "  $zip" | Out-File "$zip.sha256" -Encoding ascii
          "ASSET=$zip" | Out-File $env:GITHUB_ENV -Append

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          body: |
            Independent BepInEx 6 (IL2CPP) loader for Princess Connect! Re:Dive — official-new BepInEx (`3fab71a`) + Il2CppInterop v1.5.2 + the Unity-6 scan fix. Native runtimes trimmed to win-x64.

            **If no interop is attached, this is a loader-CORE (overlay) release:** extract `BepInEx/core/` over your existing BepInEx 6 IL2CPP install (keeps your .NET host, doorstop, interop, plugins). Game-derived interop + the translation plugins are shipped separately.

            Verified game build: see COMPATIBILITY.md. Verify the download with the published SHA-256.
