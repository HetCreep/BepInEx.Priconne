# Optional companion to watch-upstream.yml: a weekly digest of OUR open give-and-take PRs
# (author HetCreep) across the upstreams, so their merge/close/comment state is visible in one
# place. GitHub already emails HetCreep on PR activity; this is just a consolidated weekly summary.
# Free + Claude-independent (runs on GitHub).
name: watch-our-prs

on:
  schedule:
    - cron: '0 7 * * 1'      # weekly, Monday 07:00 UTC (just after the upstream watcher)
  workflow_dispatch:

permissions:
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: PR status digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Use `gh pr list` per upstream repo (direct API, not search — no indexing lag, and it
          # distinguishes MERGED from CLOSED). Scope to our author so only our give-and-take PRs show.
          {
            echo "Weekly status of our upstream give-and-take PRs (author \`HetCreep\`). Newcomer-pacing (S8): only open new PRs once these get a positive response."
            echo
            for repo in BepInEx/BepInEx BepInEx/Il2CppInterop; do
              echo "**$repo**"
              gh pr list --repo "$repo" --author HetCreep --state all --limit 50 \
                 --json number,title,state,url \
                 --jq 'if length == 0 then "- (none)" else (.[] | "- [#\(.number) \(.title)](\(.url)) — **\(.state)**") end'
              echo
            done
          } > digest.md
          num=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "PR status digest in:title" --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            gh issue comment "$num" --repo "$GITHUB_REPOSITORY" --body-file digest.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "📬 PR status digest" --body-file digest.md
          fi
