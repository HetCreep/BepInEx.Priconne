# Optional companion to watch-upstream.yml: a weekly digest of OUR open give-and-take PRs
# (author HetCreep) across the upstreams, so their merge/close/comment state is visible in one
# place. GitHub already emails HetCreep on PR activity; this is just a consolidated weekly summary.
# Free + Claude-independent (runs on GitHub).
name: watch-our-prs

on:
  schedule:
    - cron: '0 7 * * 1'      # weekly, Monday 07:00 UTC (just after the upstream watcher)
  workflow_dispatch:

permissions:
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: PR status digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Direct per-PR query (NOT search/author-filter — those hit search-indexing lag and the
          # default-token can't reliably author-filter cross-repo). Each PR is fetched by number, so
          # the result is exact. UPDATE this list when a give-and-take PR is opened/retired.
          # The issue-tied PRs still open. #268 MERGED 2026-06-06 (by ds5678) = our first give-and-take
          # merge -> dropped from the active list. #1335/#1336/#269/#270 withdrawn 2026-06-05 (no filed
          # issue); #1333 closed under S7/S8. Give-and-take is PAUSED — add none.
          PRS="BepInEx/BepInEx:1329 BepInEx/BepInEx:1330 BepInEx/BepInEx:1331 BepInEx/BepInEx:1332 BepInEx/Il2CppInterop:267"
          {
            echo "Weekly status of our 5 open give-and-take PRs (#268 merged 2026-06-06 — first merge). Give-and-take is PAUSED — these stay open, add no more (S8)."
            echo
            for ref in $PRS; do
              repo="${ref%%:*}"; num="${ref##*:}"
              line=$(gh api "repos/$repo/pulls/$num" --jq '[(if .merged then "MERGED" else (.state | ascii_upcase) end), .title] | @tsv' 2>/dev/null) || line=$'UNAVAILABLE\t(PR not found — deleted?)'
              state=$(printf '%s' "$line" | cut -f1)
              title=$(printf '%s' "$line" | cut -f2-)
              echo "- [$repo#$num](https://github.com/$repo/pull/$num) — **$state** — $title"
            done
          } > digest.md
          num=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "PR status digest in:title" --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            gh issue comment "$num" --repo "$GITHUB_REPOSITORY" --body-file digest.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "📬 PR status digest" --body-file digest.md
          fi
