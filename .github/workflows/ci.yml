# D1 — build-green gate. The default branch is the HUB (docs + CI + the assembly that combines the 4
# component branches). It checks out the BepInEx + Il2CppInterop component branches and compiles them.
# Does NOT package; that is release.yml.
#
# Trigger model: the component branches carry NO workflow of their own (they are pure vendored source),
# so a push to `BepInEx`/`Il2CppInterop` can NOT auto-fire this — GitHub runs a workflow only from the
# ref that holds it. CI therefore runs on: a hub change to the build definition (ci.yml / global.json),
# any PR, or a manual dispatch. After RE-VENDORING a component branch, trigger by hand ("Run workflow")
# — see UPGRADING.md. Actions are SHA-pinned (D2); the trailing `# vX.Y.Z` tracks the readable version.
name: build

on:
  push:
    branches: [main]
    paths: ['.github/workflows/ci.yml', 'global.json']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout BepInEx.Priconne
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: BepInEx.Priconne

      - name: Checkout BepInEx (component branch — the framework source)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: HetCreep/BepInEx.Priconne
          ref: BepInEx
          path: BepInEx

      - name: Checkout Il2CppInterop (Priconne dev branch — v1.5.2 + Unity-6 scan fix)
        # From our BepInEx.Priconne/Il2CppInterop dev branch, NOT the give-and-take fork — the loader is
        # decoupled from PR #267 so an evolving give-and-take PR never moves the version the loader ships.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: HetCreep/BepInEx.Priconne
          ref: Il2CppInterop
          path: Il2CppInterop

      - name: Setup .NET (6 = loader target TFM, 8 = build SDK — BepInEx master uses C# 12)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Build Il2CppInterop runtime
        run: dotnet build Il2CppInterop/Il2CppInterop.Runtime/Il2CppInterop.Runtime.csproj -c Release --nologo

      - name: Build BepInEx IL2CPP core (the BepInEx component branch)
        # NU5046 logo.png pack error on the IL2CPP project -> GeneratePackageOnBuild=false
        run: dotnet build BepInEx/BepInEx.sln -c Release -p:GeneratePackageOnBuild=false --nologo
